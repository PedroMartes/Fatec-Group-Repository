<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pirica de Jesus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 30px;
            min-height: 100vh;
            background: url('images/bg.jpg') center/cover no-repeat;
            font-family: 'Press Start 2P', monospace;
            overflow-x: hidden;
        }

        /* ===== DINO GAME STYLES ===== */
        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            border: 4px solid #e94560;
            border-radius: 10px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 40px;
            height: 45px;
            transition: transform 0.1s;
            z-index: 10;
        }
        .dino-corpo {
            position: absolute;
            width: 40px;
            height: 35px;
            background: #4a4a4a;
            border-radius: 10px 10px 5px 5px;
        }
        .dino-olho {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }
        .dino-boca {
            position: absolute;
            top: 18px;
            right: 5px;
            width: 8px;
            height: 4px;
            background: #4a4a4a;
            border-radius: 0 0 5px 5px;
        }
        .dino-braco {
            position: absolute;
            top: 20px;
            right: -5px;
            width: 12px;
            height: 6px;
            background: #4a4a4a;
            border-radius: 3px;
        }
        .dino-perna {
            position: absolute;
            bottom: -10px;
            width: 10px;
            height: 15px;
            background: #4a4a4a;
            border-radius: 3px;
        }
        .dino-perna.esquerda { left: 8px; }
        .dino-perna.direita { right: 8px; }
        .dino-pena {
            position: absolute;
            top: -8px;
            left: 10px;
            width: 20px;
            height: 10px;
            background: #e94560;
            border-radius: 50% 50% 0 0;
        }
        #chão {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20px;
            background: #8B4513;
            border-top: 3px solid #654321;
            z-index: 5;
        }
        .obstáculo {
            position: absolute;
            bottom: 20px;
            width: 25px;
            height: 40px;
            background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
            border-radius: 5px 5px 0 0;
            border: 2px solid #1e8449;
            z-index: 5;
        }
        .obstáculo::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 8px;
            height: 8px;
            background: #1e8449;
            border-radius: 50%;
        }
        .obstáculo::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #1e8449;
            border-radius: 50%;
        }
        #score, #flappy-score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
            z-index: 20;
        }
        #high-score, #flappy-high-score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #ffd700;
            text-shadow: 1px 1px 3px #000;
            z-index: 20;
        }
        #game-over, #flappy-game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 30;
        }
        #game-over h1, #flappy-game-over h1 {
            font-size: 30px;
            color: #e94560;
            text-shadow: 3px 3px 0 #4a4a4a;
            margin-bottom: 20px;
        }
        #game-over p, #flappy-game-over p {
            font-size: 14px;
            color: #4a4a4a;
            margin-bottom: 15px;
        }
        #reiniciar, #flappy-reiniciar {
            padding: 15px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b8354c;
            transition: all 0.1s;
        }
        #reiniciar:active, #flappy-reiniciar:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b8354c;
        }
        #iniciar-msg, #flappy-iniciar-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #4a4a4a;
            text-align: center;
            animation: piscar 1s infinite;
            z-index: 20;
        }
        @keyframes piscar {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        #nuvens {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .nuvem {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        /* ===== FLAPPY BIRD GAME STYLES ===== */
        #flappy-container {
            position: relative;
            width: 600px;
            height: 400px;
            border: 4px solid #f39c12;
            border-radius: 10px;
            background: linear-gradient(180deg, #3498db 0%, #85c1e9 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }
        #flappy-bird {
            position: absolute;
            left: 80px;
            top: 200px;
            width: 35px;
            height: 30px;
            z-index: 10;
        }
        .bird-body {
            position: absolute;
            width: 35px;
            height: 25px;
            background: #f1c40f;
            border-radius: 50% 50% 40% 40%;
        }
        .bird-eye {
            position: absolute;
            top: 5px;
            right: 8px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }
        .bird-eye::after {
            content: '';
            position: absolute;
            top: 3px;
            right: 2px;
            width: 4px;
            height: 4px;
            background: black;
            border-radius: 50%;
        }
        .bird-bico {
            position: absolute;
            top: 12px;
            right: -5px;
            width: 12px;
            height: 8px;
            background: #e74c3c;
            border-radius: 0 50% 50% 0;
        }
        .bird-asas {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 15px;
            height: 10px;
            background: #f39c12;
            border-radius: 50%;
        }
        .flappy-pipe {
            position: absolute;
            width: 60px;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 50%, #27ae60 100%);
            border: 3px solid #1e8449;
            z-index: 5;
        }
        .flappy-pipe.top {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }
        .flappy-pipe.bottom {
            border-top: none;
            border-radius: 10px 10px 0 0;
        }
        .pipe-cap {
            position: absolute;
            width: 70px;
            height: 25px;
            background: linear-gradient(180deg, #27ae60 0%, #1e8449 100%);
            border: 3px solid #145a32;
            z-index: 6;
        }
        .pipe-cap.top {
            bottom: -25px;
            left: -5px;
            border-radius: 0 0 10px 10px;
        }
        .pipe-cap.bottom {
            top: -25px;
            left: -5px;
            border-radius: 10px 10px 0 0;
        }
        #flappy-ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #8B4513;
            border-top: 4px solid #654321;
            z-index: 15;
        }
        #flappy-ground::before {
            content: '';
            position: absolute;
            top: 10px;
            width: 100%;
            height: 5px;
            background: repeating-linear-gradient(90deg, #654321 0px, #654321 20px, #8B4513 20px, #8B4513 40px);
            animation: ground-move 1s linear infinite;
        }
        @keyframes ground-move {
            from { transform: translateX(0); }
            to { transform: translateX(-40px); }
        }

        /* Title styles */
        .game-title {
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px #000;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Switch buttons */
        #game-switcher {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .game-btn {
            padding: 12px 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-btn.dino-btn {            background: #e94560;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        .game-btn.flappy-btn {
            background: #f39c12;
            color: white;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
        }
        .game-btn:hover {
            transform: scale(1.05);
        }
        .game-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .game-wrapper {
            display: none;
        }
        .game-wrapper.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Botões para trocar de jogo -->
    <div id="game-switcher">
        <button class="game-btn dino-btn active" onclick="showGame('dino')">🏃 Dino</button>
        <button class="game-btn flappy-btn" onclick="showGame('flappy')">🐦 Flappy Bird</button>
    </div>

    <!-- Dino Game Wrapper -->
    <div id="dino-game" class="game-wrapper active">
        <div class="game-title">🏃 JOGO DO DINOSSAURO</div>
        <div id="game-container">
            <div id="nuvens"></div>
            <div id="score">Score: 0</div>
            <div id="high-score">Recorde: 0</div>
            <div id="iniciar-msg">PRESSIONE ESPAÇO<br>PARA COMEÇAR!</div>
            
            <div id="dino">
                <div class="dino-corpo">
                    <div class="dino-olho"></div>
                    <div class="dino-boca"></div>
                    <div class="dino-braco"></div>
                </div>
                <div class="dino-perna esquerda"></div>
                <div class="dino-perna direita"></div>
                <div class="dino-pena"></div>
            </div>
            
            <div id="chão"></div>
            
            <div id="game-over">
                <h1>GAME OVER</h1>
                <p id="final-score">Score: 0</p>
                <button id="reiniciar" onclick="reiniciarJogo()">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <!-- Flappy Bird Game Wrapper -->
    <div id="flappy-game" class="game-wrapper">
        <div class="game-title">🐦 FLAPPY BIRD</div>
        <div id="flappy-container">
            <div id="flappy-score">Score: 0</div>
            <div id="flappy-high-score">Recorde: 0</div>
            <div id="flappy-iniciar-msg">PRESSIONE ESPAÇO<br>PARA COMEÇAR!</div>
            
            <div id="flappy-bird">
                <div class="bird-body">
                    <div class="bird-eye"></div>
                    <div class="bird-bico"></div>
                    <div class="bird-asas"></div>
                </div>
            </div>
            
            <div id="flappy-ground"></div>
            
            <div id="flappy-game-over">
                <h1>GAME OVER</h1>
                <p id="flappy-final-score">Score: 0</p>
                <button id="flappy-reiniciar" onclick="reiniciarFlappy()">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script>
        // Função para trocar entre jogos
        function showGame(game) {
            const dinoGame = document.getElementById('dino-game');
            const flappyGame = document.getElementById('flappy-game');
            const dinoBtn = document.querySelector('.dino-btn');
            const flappyBtn = document.querySelector('.flappy-btn');
            
            if (game === 'dino') {
                dinoGame.classList.add('active');
                flappyGame.classList.remove('active');
                dinoBtn.classList.add('active');
                flappyBtn.classList.remove('active');
            } else {
                dinoGame.classList.remove('active');
                flappyGame.classList.add('active');
                dinoBtn.classList.remove('active');
                flappyBtn.classList.add('active');
            }
        }

        /* ===== DINO GAME ===== */
        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const iniciarMsg = document.getElementById('iniciar-msg');

        let dinoY = 0;
        let velocidadeY = 0;
        let gravidade = 0.8;
        let pulando = false;
        let jogoIniciado = false;
        let gameOver = false;
        let score = 0;
        let highScore = localStorage.getItem('dinoHighScore') || 0;
        let velocidadeJogo = 6;
        let obstaculos = [];
        let frameCount = 0;
        let animacaoPerna = 0;

        highScoreElement.textContent = 'Recorde: ' + highScore;

        function criarNuvens() {
            const nuvensContainer = document.getElementById('nuvens');
            for (let i = 0; i < 5; i++) {
                const nuvem = document.createElement('div');
                nuvem.className = 'nuvem';
                nuvem.style.width = (60 + Math.random() * 40) + 'px';
                nuvem.style.height = (25 + Math.random() * 15) + 'px';
                nuvem.style.top = (30 + Math.random() * 80) + 'px';
                nuvem.style.left = (Math.random() * 800) + 'px';
                nuvem.style.animation = `nuvem-mover ${15 + Math.random() * 10}s linear infinite`;
                nuvensContainer.appendChild(nuvem);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes nuvem-mover {
                from { left: 800px; }
                to { left: -100px; }
            }
        `;
        document.head.appendChild(style);
        criarNuvens();

        function pular() {
            if (!jogoIniciado) {
                iniciarJogo();
                return;
            }
            
            if (!pulando && !gameOver) {
                pulando = true;
                velocidadeY = -15;
            }
        }

        function iniciarJogo() {
            if (jogoIniciado) return;
            jogoIniciado = true;
            iniciarMsg.style.display = 'none';
            gameLoop();
        }

        function reiniciarJogo() {
            gameOver = false;
            score = 0;
            velocidadeJogo = 6;
            dinoY = 0;
            velocidadeY = 0;
            pulando = false;
            frameCount = 0;
            
            obstaculos.forEach(obs => obs.remove());
            obstaculos = [];
            
            dino.style.bottom = '0px';
            gameOverElement.style.display = 'none';
            scoreElement.textContent = 'Score: 0';
            
            iniciarMsg.style.display = 'block';
            jogoIniciado = false;
        }

        function criarObstaculo() {
            const obstaculo = document.createElement('div');
            obstaculo.className = 'obstáculo';
            obstaculo.style.left = '800px';
            
            const altura = 35 + Math.random() * 25;
            obstaculo.style.height = altura + 'px';
            
            gameContainer.appendChild(obstaculo);
            obstaculos.push(obstaculo);
        }

        function colisao(dinoRect, obsRect) {
            return !(
                dinoRect.top > obsRect.bottom ||
                dinoRect.right < obsRect.left ||
                dinoRect.bottom < obsRect.top ||
                dinoRect.left > obsRect.right
            );
        }

        function gameLoop() {
            if (gameOver) return;
            
            frameCount++;

            if (pulando) {
                velocidadeY += gravidade;
                dinoY -= velocidadeY;
                
                if (dinoY <= 0) {
                    dinoY = 0;
                    pulando = false;
                    velocidadeY = 0;
                }
                
                dino.style.bottom = dinoY + 'px';
                dino.style.transform = 'rotate(-20deg)';
            } else {
                animacaoPerna++;
                if (animacaoPerna % 10 < 5) {
                    document.querySelector('.dino-perna.esquerda').style.height = '18px';
                    document.querySelector('.dino-perna.direita').style.height = '12px';
                } else {
                    document.querySelector('.dino-perna.esquerda').style.height = '12px';
                    document.querySelector('.dino-perna.direita').style.height = '18px';
                }
                dino.style.transform = 'rotate(0deg)';
            }

            if (frameCount % 100 === 0) {
                score += 10;
                scoreElement.textContent = 'Score: ' + score;
                
                if (score % 100 === 0) {
                    velocidadeJogo += 0.5;
                }
            }

            const intervaloObstaculo = Math.max(60, 120 - velocidadeJogo * 5);
            if (frameCount % Math.floor(intervaloObstaculo) === 0) {
                criarObstaculo();
            }

            const dinoRect = {
                left: 50,
                right: 90,
                top: 255 - dinoY,
                bottom: 300 - dinoY
            };

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                const obs = obstaculos[i];
                let obsLeft = parseFloat(obs.style.left);
                obsLeft -= velocidadeJogo;
                obs.style.left = obsLeft + 'px';

                const obsRect = {
                    left: obsLeft,
                    right: obsLeft + 25,
                    top: 260,
                    bottom: 300
                };

                if (colisao(dinoRect, obsRect)) {
                    gameOver = true;
                    finalScoreElement.textContent = 'Score: ' + score;
                    gameOverElement.style.display = 'block';
                    
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('dinoHighScore', highScore);
                        highScoreElement.textContent = 'Recorde: ' + highScore;
                    }
                    return;
                }

                if (obsLeft < -50) {
                    obs.remove();
                    obstaculos.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        /* ===== FLAPPY BIRD GAME ===== */
        const flappyBird = document.getElementById('flappy-bird');
        const flappyContainer = document.getElementById('flappy-container');
        const flappyScoreElement = document.getElementById('flappy-score');
        const flappyHighScoreElement = document.getElementById('flappy-high-score');
        const flappyGameOverElement = document.getElementById('flappy-game-over');
        const flappyFinalScoreElement = document.getElementById('flappy-final-score');
        const flappyIniciarMsg = document.getElementById('flappy-iniciar-msg');

        let birdY = 200;
        let birdVelocity = 0;
        let flappyGameStarted = false;
        let flappyGameOver = false;
        let flappyScore = 0;
        let flappyHighScore = localStorage.getItem('flappyHighScore') || 0;
        let pipes = [];
        let flappyFrameCount = 0;

        flappyHighScoreElement.textContent = 'Recorde: ' + flappyHighScore;

        function pularFlappy() {
            if (!flappyGameStarted) {
                iniciarFlappy();
                return;
            }
            
            if (!flappyGameOver) {
                birdVelocity = -10;
            }
        }

        function iniciarFlappy() {
            if (flappyGameStarted) return;
            flappyGameStarted = true;
            flappyIniciarMsg.style.display = 'none';
            flappyGameLoop();
        }

        function reiniciarFlappy() {
            flappyGameOver = false;
            flappyScore = 0;
            birdY = 200;
            birdVelocity = 0;
            flappyFrameCount = 0;
            
            pipes.forEach(pipe => {
                pipe.top.remove();
                pipe.bottom.remove();
            });
            pipes = [];
            
            flappyBird.style.top = '200px';
            flappyBird.style.transform = 'rotate(0deg)';
            flappyGameOverElement.style.display = 'none';
            flappyScoreElement.textContent = 'Score: 0';
            
            flappyIniciarMsg.style.display = 'block';
            flappyGameStarted = false;
        }

        function createPipe() {
            const gap = 200;
            const pipeHeight = 100 + Math.random() * 100;
            const containerHeight = 400;
            
            const topPipe = document.createElement('div');
            topPipe.className = 'flappy-pipe top';
            topPipe.style.height = pipeHeight + 'px';
            topPipe.style.left = '600px';
            topPipe.style.top = '0';
            
            const topCap = document.createElement('div');
            topCap.className = 'pipe-cap top';
            topPipe.appendChild(topCap);
            
            const bottomPipe = document.createElement('div');
            bottomPipe.className = 'flappy-pipe bottom';
            bottomPipe.style.height = (containerHeight - pipeHeight - gap - 50) + 'px';
            bottomPipe.style.left = '600px';
            bottomPipe.style.bottom = '50px';
            
            const bottomCap = document.createElement('div');
            bottomCap.className = 'pipe-cap bottom';
            bottomPipe.appendChild(bottomCap);
            
            flappyContainer.appendChild(topPipe);
            flappyContainer.appendChild(bottomPipe);
            
            pipes.push({
                top: topPipe,
                bottom: bottomPipe,
                passed: false,
                x: 600
            });
        }

        function checkFlappyCollision(pipe) {
            const birdRect = {
                left: 80,
                right: 115,
                top: birdY,
                bottom: birdY + 25
            };
            
            const topPipeBottom = parseInt(pipe.top.style.height);
            const bottomPipeTop = 400 - 50 - parseInt(pipe.bottom.style.height);
            
            if (birdRect.right > pipe.x && birdRect.left < pipe.x + 60) {
                if (birdRect.top < topPipeBottom) {
                    return true;
                }
            }
            
            if (birdRect.right > pipe.x && birdRect.left < pipe.x + 60) {
                if (birdRect.bottom > bottomPipeTop) {
                    return true;
                }
            }
            
            if (birdY < 0 || birdY > 350) {
                return true;
            }
            
            return false;
        }

        function flappyGameLoop() {
            if (flappyGameOver) return;
            
            flappyFrameCount++;
            
            birdVelocity += 0.5;
            birdY += birdVelocity;
            
            let rotation = Math.min(Math.max(birdVelocity * 3, -25), 90);
            flappyBird.style.transform = 'rotate(' + rotation + 'deg)';
            flappyBird.style.top = birdY + 'px';
            
            if (flappyFrameCount % 100 === 0) {
                createPipe();
            }
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                let pipe = pipes[i];
                pipe.x -= 3;
                pipe.top.style.left = pipe.x + 'px';
                pipe.bottom.style.left = pipe.x + 'px';
                
                if (!pipe.passed && pipe.x < 80) {
                    pipe.passed = true;
                    flappyScore++;
                    flappyScoreElement.textContent = 'Score: ' + flappyScore;
                }
                
                if (checkFlappyCollision(pipe)) {
                    flappyGameOver = true;
                    flappyFinalScoreElement.textContent = 'Score: ' + flappyScore;
                    flappyGameOverElement.style.display = 'block';
                    
                    if (flappyScore > flappyHighScore) {
                        flappyHighScore = flappyScore;
                        localStorage.setItem('flappyHighScore', flappyHighScore);
                        flappyHighScoreElement.textContent = 'Recorde: ' + flappyHighScore;
                    }
                    return;
                }
                
                if (pipe.x < -60) {
                    pipe.top.remove();
                    pipe.bottom.remove();
                    pipes.splice(i, 1);
                }
            }
            
            requestAnimationFrame(flappyGameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                const dinoActive = document.getElementById('dino-game').classList.contains('active');
                if (dinoActive) {
                    pular();
                } else {
                    pularFlappy();
                }
            }
        });

        gameContainer.addEventListener('click', pular);
        gameContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pular();
        });

        flappyContainer.addEventListener('click', pularFlappy);
        flappyContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pularFlappy();
        });
    </script>
</body>
</html>
